<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tell Me How You Really Feel</title>
  <meta
    name="description"
    content="Tell Me How You Really Feel with Michelle Serra and Hannah Ledeen — film and TV reviews through awards-critic ratings vs honest viewer opinions."
  />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=Inter:wght@400;500;600;700&display=swap"
    rel="stylesheet"
  />

  <style>
    :root {
      --bg: #f8f6f2;
      --paper: #ffffff;
      --ink: #1f1f23;
      --muted: #64605a;
      --gold: #b89354;
      --gold-deep: #9f7b3d;
      --line: #e8e0d3;
      --shadow: 0 10px 24px rgba(35, 26, 12, 0.08);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Inter, Arial, sans-serif;
      color: var(--ink);
      background:
        radial-gradient(circle at 90% -10%, #fff4dc 0%, rgba(255, 244, 220, 0) 34%),
        radial-gradient(circle at 0% 0%, #fff8ea 0%, rgba(255, 248, 234, 0) 24%),
        var(--bg);
      line-height: 1.6;
    }

    .wrap {
      width: min(1100px, 92%);
      margin: 0 auto;
    }

    header {
      border-bottom: 1px solid var(--line);
      background: rgba(248, 246, 242, 0.88);
      backdrop-filter: blur(4px);
      position: sticky;
      top: 0;
      z-index: 10;
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 16px;
      flex-wrap: wrap;
      padding: 16px 0;
    }

    .brand {
      margin: 0;
      font-family: "Cormorant Garamond", serif;
      font-size: 1.85rem;
      letter-spacing: 0.02em;
    }

    nav a {
      color: var(--ink);
      text-decoration: none;
      margin-left: 14px;
      font-weight: 600;
      font-size: 0.95rem;
    }

    nav a:hover {
      color: var(--gold-deep);
    }

    .hero {
      text-align: center;
      padding: 70px 0 44px;
    }

    .kicker {
